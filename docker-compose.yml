version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trialwhisperer
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 512m
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 256m
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    ports:
      - '8100:8000'
    mem_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    command: ['python', '-m', 'arq', 'app.workers.tasks.WorkerSettings']
    mem_limit: 512m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - '3100:80'
    depends_on:
      backend:
        condition: service_started

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    profiles: ['dev']
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5150:80'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
