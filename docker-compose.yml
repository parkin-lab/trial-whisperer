version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: trial_whisperer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    command: ["arq", "app.workers.tasks.WorkerSettings"]
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
    ports:
      - '5173:80'
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
